services:


  backend:

    container_name: fleet-backend


    build:
      context: .
      dockerfile: Dockerfile


    restart: unless-stopped


    env_file:
      - .env


    environment:

      DB_HOST: timescaledb
      DB_PORT: 5432

      MQTT_HOST: emqx
      MQTT_PORT: 1883

      # FDD §11.1 — Redis Cache layer
      # ชื่อ service "redis" ใน internal Docker network (คนละพอร์ตกับ
      # ที่ expose ออกสู่ host — ดู service redis ด้านล่าง)
      REDIS_HOST: redis
      REDIS_PORT: 6379


    ports:

      - "8001:8000"


    depends_on:

      timescaledb:
        condition: service_healthy


      emqx:
        condition: service_healthy


      redis:
        condition: service_healthy



    healthcheck:

      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/"
        ]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 40s



    networks:

      - fleet-network





  timescaledb:


    container_name: fleet-timescaledb


    image:
      timescale/timescaledb:latest-pg16


    restart: unless-stopped



    environment:

      POSTGRES_DB:
        ${DB_NAME}

      POSTGRES_USER:
        ${DB_USER}

      POSTGRES_PASSWORD:
        ${DB_PASS}



    ports:

      - "5435:5432"



    volumes:


      - timescale_data:/var/lib/postgresql/data


      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql



    healthcheck:


      test:

        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME}"
        ]


      interval: 10s

      timeout: 5s

      retries: 10



    networks:

      - fleet-network






  emqx:


    container_name: fleet-emqx


    image:
      emqx/emqx:latest


    restart: unless-stopped


    # ────────────────────────────────────────────────────────────
    # FDD §13 Security — "MQTT username/password per device"
    # ────────────────────────────────────────────────────────────
    # TODO (infra, ไม่ใช่ scope ของโค้ดนี้): ตั้งค่า EMQX
    # Authentication/ACL ให้ตรวจสอบ credential ของแต่ละ device จาก
    # ตาราง devices.mqtt_username / devices.mqtt_password_hash
    # (เช่นผ่าน EMQX "Authentication" → PostgreSQL backend หรือ
    # HTTP auth webhook ที่ query ตาราง devices) แทนการใช้
    # MQTT_USER/MQTT_PASS ตัวเดียวร่วมกันทุก device ปัจจุบัน
    # ค่า MQTT_USER/MQTT_PASS ใน .env ยังคงใช้เฉพาะฝั่ง backend
    # subscriber (คนละบทบาทกับ credential ที่ device ใช้ publish)
    # ────────────────────────────────────────────────────────────


    ports:


      - "1884:1883"

      - "18084:18083"

      # FDD §13 — "MQTT over TLS 1.2" — TLS listener (เพิ่มใหม่)
      # ไม่ลบ 1883/1884 (plain) เดิม — ใช้คู่ขนานกันได้
      - "8883:8883"



    volumes:


      - emqx_data:/opt/emqx/data

      - emqx_log:/opt/emqx/log



    healthcheck:


      test:

        [
          "CMD",
          "/opt/emqx/bin/emqx",
          "ctl",
          "status"
        ]


      interval: 30s

      timeout: 10s

      retries: 10

      start_period: 60s



    networks:

      - fleet-network


  # ──────────────────────────────────────────────────────────────
  # FDD §11.1 — "Cache | Redis 7 | 6379 | Session, rate limit,
  # real-time dashboard"
  # ──────────────────────────────────────────────────────────────
  # หมายเหตุ port mapping: ใช้ 6380:6379 (เหมือน timescaledb ที่ใช้
  # 5435:5432) เพื่อกัน conflict กับ Redis local ที่อาจรันอยู่แล้ว
  # บนเครื่อง dev ที่ port 6379 ปกติ — service อื่นใน docker network
  # นี้ (backend) ยังคุยกันผ่าน internal port 6379 ตามปกติ (ดู
  # REDIS_HOST/REDIS_PORT ใน service backend ด้านบน) ไม่กระทบจาก
  # port mapping ภายนอกนี้เลย
  redis:

    container_name: fleet-redis

    image:
      redis:7-alpine

    restart: unless-stopped

    ports:

      - "6380:6379"

    volumes:

      # persist ข้อมูล session ไม่ให้หายตอน container restart
      - redis_data:/data

    healthcheck:

      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]

      interval: 10s

      timeout: 5s

      retries: 10

      start_period: 10s

    networks:

      - fleet-network


  # ──────────────────────────────────────────────────────────────
  # FDD §11.1 — "Reverse Proxy | Nginx | 80/443 | SSL termination,
  # load balance" และ §13 — "REST API ผ่าน HTTPS"
  # ──────────────────────────────────────────────────────────────
  # หมายเหตุสำคัญ (infra, ไม่ใช่ scope ของโค้ด backend):
  #   - nginx.conf อ้างอิง ssl_certificate / ssl_certificate_key ที่
  #     PATH PLACEHOLDER (./nginx/certs/) — ไฟล์ cert จริงยังไม่ถูกสร้าง
  #     ไว้ในโปรเจกต์นี้ ต้อง generate/จัดหาแยกต่างหาก:
  #       • Dev/local     → self-signed cert (openssl req -x509 ...)
  #       • Staging/Prod  → Let's Encrypt (certbot) หรือ cert จริงจาก CA
  #   - ถ้ายังไม่มีไฟล์ cert อยู่ใน ./nginx/certs/ container nginx นี้
  #     จะ exit ทันทีตอน start (nginx ไม่สามารถ bind SSL context ได้
  #     โดยไม่มีไฟล์ cert) — นี่คือพฤติกรรมที่ "ตั้งใจ" ปล่อยไว้ก่อน
  #     จนกว่าทีม infra จะใส่ cert จริงเข้ามา
  #   - service นี้ "ไม่มี" service อื่นใดมา depends_on กลับ
  #     (ไม่มี service ไหน depends_on: nginx) ดังนั้นถ้า nginx fail
  #     to start, backend / timescaledb / emqx จะยัง healthy และ
  #     ทำงานได้ตามปกติ — dev/debug ยังเข้า backend ตรงผ่าน 8001:8000
  #     (port mapping เดิม ไม่ได้ถูกลบหรือแก้ไข) ได้เหมือนเดิมทุกประการ
  #   - healthcheck ของ nginx ตั้งใจ "ไม่ผูก" service อื่นไว้ด้วย
  #     (ไม่มีใคร depends_on: nginx.condition: service_healthy)
  #     เพื่อไม่ให้ `docker-compose up` ทั้งชุด block/fail ถ้า nginx
  #     ยังไม่พร้อมเรื่อง cert
  nginx:

    container_name: fleet-nginx

    image:
      nginx:latest

    restart: unless-stopped

    ports:

      - "80:80"

      - "443:443"

    volumes:

      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # PLACEHOLDER — mount โฟลเดอร์ cert จริงเข้ามาที่นี่
      # (self-signed สำหรับ dev, Let's Encrypt/CA cert สำหรับ prod)
      # ไฟล์ที่ต้องมีอยู่จริงก่อน container นี้จะ start สำเร็จ:
      #   ./nginx/certs/fullchain.pem
      #   ./nginx/certs/privkey.pem
      - ./nginx/certs:/etc/nginx/certs:ro

    depends_on:

      backend:
        condition: service_healthy

    networks:

      - fleet-network

    # healthcheck เป็น optional/soft-check เท่านั้น — ไม่มี service
    # อื่นใดใน compose file นี้ depends_on nginx จึงไม่ทำให้ stack
    # โดยรวมล้มเหลวถ้า nginx ยัง unhealthy (เช่น ยังไม่มี cert จริง)
    healthcheck:

      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:80/"
        ]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 20s




networks:


  fleet-network:

    driver: bridge






volumes:


  timescale_data:


  emqx_data:


  emqx_log:


  redis_data:
