# nginx/nginx.conf
#
# FDD v1.4 §11.1 — "Reverse Proxy | Nginx | 80/443 | SSL termination,
# load balance"
# FDD v1.4 §13   — Security: "REST API ผ่าน HTTPS"
#
# ขอบเขตของไฟล์นี้: ทำหน้าที่เป็น TLS-terminating reverse proxy ชั้น
# นอกสุดเท่านั้น ส่งต่อ (proxy_pass) ทุก request ไปยัง FastAPI backend
# ที่รันอยู่ภายใน internal Docker network (service name "backend",
# internal port 8000 — พอร์ตเดียวกับที่ container backend เดิม EXPOSE
# ไว้ใน Dockerfile) ไม่มีการแก้ไข business logic ใดๆ ในชั้นนี้
#
# ─────────────────────────────────────────────────────────────
# ⚠️ CERTIFICATE PLACEHOLDER — งาน infra/deployment แยกต่างหาก
# ─────────────────────────────────────────────────────────────
# ไฟล์ต่อไปนี้ "ยังไม่มีอยู่จริง" ในโปรเจกต์นี้ ต้องถูกสร้าง/จัดหา
# แยกต่างหากก่อน service nginx จะ start สำเร็จ:
#
#   /etc/nginx/certs/fullchain.pem   (certificate chain)
#   /etc/nginx/certs/privkey.pem     (private key)
#
# วิธีจัดหา:
#   • Dev / local testing:
#       openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#         -keyout ./nginx/certs/privkey.pem \
#         -out ./nginx/certs/fullchain.pem \
#         -subj "/CN=localhost"
#     (self-signed — browser จะเตือนไม่ trust แต่ TLS ยัง encrypt
#      ได้ปกติ เหมาะสำหรับ dev เท่านั้น)
#
#   • Staging / Production:
#       ใช้ Let's Encrypt (certbot) ออก cert จริงตาม domain name
#       จริงของระบบ หรือใช้ cert จาก internal CA / ผู้ให้บริการ
#       ที่องค์กรใช้งานอยู่ แล้ว mount เข้ามาแทนที่ path เดียวกัน
#
# ห้าม commit private key จริงเข้า git repository — ใช้ secret
# management ของ CI/CD หรือ mount จาก secure volume ภายนอกแทน
# ─────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {

    # ───────────────────────────────────────────────────────
    # Upstream — FastAPI backend ภายใน internal Docker network
    # ชื่อ "backend" ต้องตรงกับ service name ใน docker-compose.yml
    # พอร์ต 8000 คือพอร์ตภายใน container (ไม่ใช่ 8001 ที่ expose
    # ออกสู่ host — nginx คุยกับ backend ผ่าน internal network
    # โดยตรง ไม่ผ่าน host port mapping)
    # ───────────────────────────────────────────────────────
    upstream fleet_backend {
        server backend:8000;
    }

    # ───────────────────────────────────────────────────────
    # HTTP (port 80) — redirect ทุกอย่างไป HTTPS
    # FDD §13: "REST API ผ่าน HTTPS" — ไม่ควรให้ traffic จริงวิ่งบน
    # plain HTTP ใน production
    # ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ───────────────────────────────────────────────────────
    # HTTPS (port 443) — SSL termination + reverse proxy
    # ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # PLACEHOLDER paths — ดูคำอธิบายด้านบนของไฟล์นี้
        # ต้องมีไฟล์จริงอยู่ก่อน nginx จะ start สำเร็จ
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # FDD §13: "MQTT over TLS 1.2" ระบุ TLS 1.2 ขั้นต่ำสำหรับ MQTT —
        # ใช้มาตรฐานเดียวกันฝั่ง REST API เพื่อความสอดคล้องกันทั้งระบบ
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location / {
            proxy_pass         http://fleet_backend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support (GET /api/v1/fleet/live ใช้ text/event-stream —
            # ต้องปิด buffering ไม่งั้น nginx จะ hold การ stream ไว้)
            proxy_buffering    off;
            proxy_read_timeout 3600s;
        }

        # Health check endpoint ผ่าน nginx (สำหรับ healthcheck ของ
        # nginx service เอง ใน docker-compose.yml — เรียก backend "/"
        # ผ่าน internal proxy)
        location = /health {
            proxy_pass http://fleet_backend/;
        }
    }
}
